services:
  - type: web
    name: liga-libre-api
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    envVars:
      - key: DATABASE_TYPE
        value: SqlServer
      - key: ConnectionStrings__DefaultConnection
        sync: false

  - type: web
    name: liga-libre-web
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile.web
    envVars:
      - key: ApiBaseUrl
        value: https://liga-libre-api.onrender.com
