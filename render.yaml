databases:
  - name: liga-libre-db
    plan: free
    databaseName: liga_libre
    user: liga_user

services:
  - type: web
    name: liga-libre-api
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    envVars:
      - key: DATABASE_TYPE
        value: PostgreSql
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: liga-libre-db
          property: connectionString

  - type: web
    name: liga-libre-web
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile.web
    envVars:
      - key: ApiBaseUrl
        value: https://liga-libre-api.onrender.com
