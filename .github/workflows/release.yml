name: Release

on:
  workflow_run:
    workflows: ["Acceptance Tests"]
    types: [completed]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: echo "VERSION=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"

      - name: Deploy API to Render
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"imageUrl": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:${{ steps.version.outputs.VERSION }}"}' \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_API }}/deploys"

      - name: Deploy Web to Render
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"imageUrl": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:${{ steps.version.outputs.VERSION }}"}' \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_WEB }}/deploys"
