name: Acceptance Tests

on:
  workflow_run:
    workflows: ["Commit Stage"]
    types: [completed]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  acceptance-tests:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        shell: pwsh
        run: ./scripts/build.ps1

      - name: Acceptance Tests
        shell: pwsh
        run: dotnet test Tests/Test.Acceptance/Test.Acceptance.csproj --configuration Release --no-build --logger trx --results-directory TestResults/Acceptance

      - name: Integration Tests
        shell: pwsh
        run: dotnet test Tests/Test.Integration/Test.Integration.csproj --configuration Release --no-build --logger trx --results-directory TestResults/Integration

  publish-and-deploy:
    needs: acceptance-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Extract version
        id: version
        run: echo "VERSION=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:latest

      # - name: Build and push Web image
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: .
      #     file: Dockerfile.web
      #     push: true
      #     tags: |
      #       ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:${{ steps.version.outputs.VERSION }}
      #       ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:latest

      # - name: Debug Render config
      #   run: |
      #     echo "Service ID length: ${#SERVICE_ID}"
      #     echo "API Key length: ${#API_KEY}"
      #     echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:${{ steps.version.outputs.VERSION }}"
      #     echo "URL: https://api.render.com/v1/services/${SERVICE_ID}/deploys"
      #   env:
      #     SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_API_STAGING }}
      #     API_KEY: ${{ secrets.RENDER_API_KEY }}

      - name: Deploy API to Staging
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"imageUrl": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:${{ steps.version.outputs.VERSION }}"}' \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_API_STAGING }}/deploys"

      - name: Deploy Web to Staging
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"imageUrl": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:${{ steps.version.outputs.VERSION }}"}' \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_WEB_STAGING }}/deploys"

  update-db:
    needs: publish-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Esperar a que la API este disponible
        env:
          API_URL: ${{ vars.SMOKE_STAGING_API_URL }}
        run: |
          for i in {1..30}; do
            if curl -sf "$API_URL/Deployment/build" > /dev/null; then
              echo "API disponible"
              exit 0
            fi
            echo "Intento $i: API todavia no responde, reintentando en 10s..."
            sleep 10
          done
          echo "La API no respondio a tiempo"
          exit 1

      - name: Update DB
        env:
          API_URL: ${{ vars.SMOKE_STAGING_API_URL }}
        run: curl -fsS -X POST "$API_URL/Deployment/update-database"

  smoke-tests:
    needs: update-db
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Verificar drift entre modelo y migraciones
        env:
          API_URL: ${{ vars.SMOKE_STAGING_API_URL }}
        run: curl -fsS "$API_URL/Deployment/model-drift"

      - name: Smoke Tests
        env:
          SMOKE_API_URL: ${{ vars.SMOKE_STAGING_API_URL }}
        run: dotnet test Tests/Test.Smoke/Test.Smoke.csproj --configuration Release --logger trx --results-directory TestResults/Smoke